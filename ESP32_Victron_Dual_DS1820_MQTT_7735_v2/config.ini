; =============================================================================
; config.ini - Runtime configuration for Victron Temperature Monitor
; =============================================================================
;
; Place this file on the SD card as /config.ini
; Only include keys you want to override - missing keys use compiled defaults.
; Lines starting with ; or # are comments.
;
; =============================================================================

; ================================ WiFi ================================
; wifi_ssid = IOT
; wifi_password = your_password
; wifi_connect_timeout_ms = 10000
; wifi_reconnect_interval_ms = 30000

; ================================ MQTT ================================
; mqtt_host = 192.168.40.250
; mqtt_port = 1883
; mqtt_user = labmqtt
; mqtt_password = your_password
; mqtt_client_name = VictronTempMonitor
; mqtt_base_topic = solar
; mqtt_qos = 1
; mqtt_retain = true

; ================================ NTP ================================
; ntp_server = 192.168.20.1
; gmt_offset_sec = 7200
; daylight_offset_sec = 0

; ================================ Device Names ================================
; Display names (max 16 chars)
; device_name_0 = MPPT_Wes
; device_name_1 = MPPT_Oos
; device_name_2 = Inverter
; device_name_3 = Batterye

; ================================ MQTT Topic Suffixes ================================
; device_topic_0 = mppt_w
; device_topic_1 = mppt_e
; device_topic_2 = inverter
; device_topic_3 = batteries

; ================================ Temperature Thresholds ================================
; Fan turns ON at this temperature (per device)
; temp_fan_on_0 = 35.0
; temp_fan_on_1 = 35.0
; temp_fan_on_2 = 35.0
; temp_fan_on_3 = 30.0

; Fan turns OFF at this temperature (per device)
; temp_fan_off_0 = 35.0
; temp_fan_off_1 = 35.0
; temp_fan_off_2 = 35.0
; temp_fan_off_3 = 30.0

; Hysteresis: fan turns off when temp drops this much below fan_on threshold
; temp_fan_hysteresis = 5.0

; Valid temperature range for DS18B20 readings
; temp_min_valid = -5.0
; temp_max_valid = 75.0

; ================================ Timing Intervals (ms) ================================
; sensor_interval = 2000
; display_interval = 4000
; mqtt_interval = 30000
; status_interval = 60000
; ntp_interval = 7200000

; ================================ DS18B20 Sensor Addresses ================================
; Format: colon-separated hex bytes (28:XX:XX:XX:XX:XX:XX:XX)
; Use sensor assignment mode to discover addresses.
; NVS-saved addresses (from assignment) take priority over these.
; sensor_addr_0 = 28:D6:0D:95:F0:01:3C:B0
; sensor_addr_1 = 28:79:EC:95:F0:FF:3C:9A
; sensor_addr_2 = 28:00:00:00:00:00:00:00
; sensor_addr_3 = 28:00:00:00:00:00:00:00

; ================================ Display ================================
; tft_rotation = 2
; startup_line_1 = Labfin
; startup_line_2 = Temperature
; startup_line_3 = Controller

; ================================ Fan Relay ================================
; true = active LOW (relay board inverts), false = active HIGH
; fan_active_low = true

; ================================ Watchdog ================================
; wdt_timeout_s = 60
